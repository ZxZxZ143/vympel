global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/vympel-alerts.yml

scrape_configs:
  - job_name: vympel-backend
    metrics_path: /actuator/prometheus
    scheme: http
    static_configs:
      - targets: [backend:8080]
        labels:
          service: vympel-backend
          environment: example

  - job_name: vympel-health
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://backend:8080/actuator/health/readiness
          - http://storefront:3000/ru
          - http://crm:3001/login
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
