name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "vympel_back/**"
      - "compose.yml"
      - ".env.example"
      - ".env.docker.example"
      - "infrastructure/**"
      - "deployment/**"
      - ".github/workflows/backend-ci.yml"
      - ".github/workflows/full-release-gate.yml"
  pull_request:
    paths:
      - "vympel_back/**"
      - "compose.yml"
      - ".env.example"
      - ".env.docker.example"
      - "infrastructure/**"
      - "deployment/**"
      - ".github/workflows/backend-ci.yml"
      - ".github/workflows/full-release-gate.yml"
  workflow_call:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vympel_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci-only-postgres-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vympel_db"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      VYMPEL_DB_URL: jdbc:postgresql://127.0.0.1:5432/vympel_db
      VYMPEL_DB_USERNAME: postgres
      VYMPEL_DB_PASSWORD: ci-only-postgres-password
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-java@v4.7.1
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Run backend tests
        working-directory: vympel_back
        run: ./gradlew --no-daemon --console=plain test
      - name: Build executable JAR
        working-directory: vympel_back
        run: ./gradlew --no-daemon --console=plain bootJar
      - name: Verify migration and security coverage
        working-directory: vympel_back
        run: >-
          ./gradlew --no-daemon --console=plain test
          --tests com.shop.vympel.db.RefreshSessionMigrationTest
          --tests com.shop.vympel.deployment.MigrationVerificationRunnerTest
          --tests com.shop.vympel.security.config.NonLocalSecurityConfigurationValidatorTest
          --tests com.shop.vympel.bootstrap.admin.LocalAdminBootstrapRunnerTest
          --tests com.shop.vympel.bootstrap.admin.LocalAdminBootstrapServiceTest
      - name: Build backend image
        run: docker build --pull --tag "vympel-backend:${GITHUB_SHA}" vympel_back
