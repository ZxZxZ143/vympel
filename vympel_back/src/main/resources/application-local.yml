spring:
  datasource:
    url: "${VYMPEL_DB_URL:jdbc:postgresql://localhost:5433/vympel_db}"
    username: "${VYMPEL_DB_USERNAME:vympel_local}"
    password: "${VYMPEL_DB_PASSWORD:VympelLocalDb_2026_Q7mZ4vK9nR2xT8pW5cF3}"
  data:
    redis:
      url: "${VYMPEL_REDIS_URL:redis://localhost:6379}"

security:
  jwt:
    secret: "${VYMPEL_JWT_SECRET:VympelLocalJwt_2026_Q7mZ4vK9nR2xT8pW5cF3aH6sD1yL8}"
  crm-session:
    secure: "${VYMPEL_CRM_REFRESH_COOKIE_SECURE:false}"
  rate-limit:
    storage: "${VYMPEL_RATE_LIMIT_STORAGE:redis}"
    hmac-secret: "${VYMPEL_RATE_LIMIT_HMAC_SECRET:VympelLocalLimiter_2026_B8nW3kR6uS9qP2xC5mF7tL4zA1}"
    trusted-proxies: "${VYMPEL_TRUSTED_PROXY_CIDRS:127.0.0.1/32,::1/128}"

storage:
  s3:
    bucket: "${VYMPEL_S3_BUCKET:dev-backet}"
    region: "${VYMPEL_S3_REGION:us-east-1}"
    endpoint: "${VYMPEL_S3_ENDPOINT:http://localhost:9100}"
    public-endpoint: "${VYMPEL_S3_PUBLIC_ENDPOINT:http://localhost:9100}"
    accessKey: "${VYMPEL_S3_ACCESS_KEY:VympelDevAccess2026}"
    secretKey: "${VYMPEL_S3_SECRET_KEY:VympelLocalS3_2026_R5xN8cK2pT7mW4zF9qL3}"
    pathStyle: "${VYMPEL_S3_PATH_STYLE:true}"

app:
  cors:
    allowed-origins: "${VYMPEL_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}"
  cms:
    public-revalidate:
      enabled: "${VYMPEL_CMS_PUBLIC_REVALIDATE_ENABLED:true}"
      url: "${VYMPEL_CMS_PUBLIC_REVALIDATE_URL:http://localhost:3000/api/revalidate}"
      secret: "${VYMPEL_CMS_REVALIDATE_SECRET:VympelLocalCms_2026_C9vT4mL8qR2wP6xB3nK7sF5zA1D8uH}"
      required: "${VYMPEL_CMS_REVALIDATE_REQUIRED:true}"
    media-cleanup:
      scheduled-enabled: "${VYMPEL_CMS_MEDIA_CLEANUP_ENABLED:false}"
